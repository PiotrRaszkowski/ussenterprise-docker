api:
  dashboard: true
#  debug: true

log:
  level: DEBUG
accessLog: {}

entryPoints:
  http:
    address: ":80"
#   http:
#      redirections:
#        entryPoint:
#          to: https
#          scheme: https
  https:
    address: ":443"

