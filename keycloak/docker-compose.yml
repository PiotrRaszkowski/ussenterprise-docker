services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        #      KEYCLOAK_ADMIN: admin
        #KEYCLOAK_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      KC_DB: mariadb
      KC_DB_URL: jdbc:mariadb://mariadb:3306/keycloak
        #      KC_DB_URL_PROPERTIES: "useSSL=false&allowPublicKeyRetrieval=true"
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: keycloak.lagowska46.ovh
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_PROXY: edge
    command: start
    restart: unless-stopped
    networks:
      - keycloak
      - mariadb
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS
      - "traefik.http.routers.keycloak.entrypoints=http"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.lagowska46.ovh`)"
      - "traefik.http.middlewares.keycloak-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.keycloak-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.keycloak.middlewares=keycloak-https-redirect"
      # HTTPS router
      - "traefik.http.routers.keycloak-secure.entrypoints=https"
      - "traefik.http.routers.keycloak-secure.rule=Host(`keycloak.lagowska46.ovh`)"
      - "traefik.http.routers.keycloak-secure.tls=true"
      - "traefik.http.routers.keycloak-secure.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.routers.keycloak-secure.service=keycloak"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.http.services.keycloak.loadbalancer.server.scheme=http"
      # Optional Traefik healthcheck (only if your Keycloak exposes /health/ready)
      #      - "traefik.http.services.keycloak.loadbalancer.healthcheck.path=/health/ready"
      #- "traefik.http.services.keycloak.loadbalancer.healthcheck.interval=10s"
      #- "traefik.http.services.keycloak.loadbalancer.healthcheck.timeout=3s"
      # Ensure Traefik uses the correct Docker network
      - "traefik.docker.network=traefik-proxy"
        #healthcheck:
        #test: ["CMD", "curl", "-fsS", "http://keycloak:8080/health/ready"]
        #interval: 30s
        #timeout: 5s
        #retries: 10

networks:
    traefik-proxy:
        external: true
        name: traefik-proxy
    keycloak:
        external: true
        name: keycloak
    mariadb:
        external: true
        name: mariadb

