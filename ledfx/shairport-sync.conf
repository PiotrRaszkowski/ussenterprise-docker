// Shairport-Sync configuration for LedFX
// Audio is routed to LedFX via PulseAudio, not to physical speakers.

general = {
  // Name visible in AirPlay device list on iPhone/Mac
  name = "LedFX";

  // Prevent AirPlay volume changes from affecting LedFX input level.
  // LedFX needs consistent audio amplitude for reliable effect generation.
  ignore_volume_control = "yes";

  // Interpolation for better audio quality
  interpolation = "basic";

  // Drift tolerance (microseconds) - helps with sync stability
  drift_tolerance_in_seconds = 0.002;

  // Resync threshold (seconds)
  resync_threshold_in_seconds = 0.050;

  output_backend = "pa";
};

mdns = {
  interface = "enp4s0";
};

// Use PulseAudio backend to share audio with LedFX container
// via the shared /tmp (mapped to ./pulse) socket
backend = "pa";

pa = {
  // PulseAudio application name (visible in pavucontrol)
  application_name = "Shairport-Sync-LedFX";

  // Sink name - leave empty to use default PulseAudio sink
  // sink = "";
};

// Session control - auto-start/stop behavior
sessioncontrol = {
  // Allow another AirPlay session to interrupt current one
  allow_session_interruption = "yes";

  // Timeout before session is considered ended (seconds)
  session_timeout = 20;
};

diagnostics = {
  // Set to "yes" for troubleshooting, "no" for production
  log_verbosity = 0;
};
