review:
  genai:
    enabled: true
    preferred_language: Polish
    image_source: recordings
    additional_concerns:
      - zwierzęta na terenie posesji
      - brama lub furtka pozostawiona otwarta
      - paczka pozostawiona pod drzwiami
      - pojazd zaparkowany na podjeździe dłużej niż zwykle
    activity_context_prompt: |
      ### Normalna aktywność — Poziom 0
      - Znane/zweryfikowane osoby (face recognition) w dowolnej strefie o dowolnej porze
      - Osoby z psami na terenie osiedla
      - Dostawy i usługi w godzinach dziennych (6:00-22:00): kurier niosący paczkę, zostawiający przesyłkę, odchodzący
      - Pracownicy serwisowi z widocznymi narzędziami, mundurami lub pojazdami serwisowymi w ciągu dnia
      - Aktywność ograniczona wyłącznie do przestrzeni publicznej (chodniki, ulice) bez wchodzenia na teren posesji
      - Samochody przejeżdżające drogą lub parkujące na krótko
 
      ### Podejrzana aktywność — Poziom 1
      - **Próby otwierania drzwi/okien/klamek pojazdów lub budynków** — ZAWSZE Poziom 1, niezależnie od pory i czasu trwania
      - **Niezidentyfikowana osoba na terenie prywatnym (podjazd, przy pojazdach/budynkach) w godzinach 23:00-5:00** — ZAWSZE Poziom 1, niezależnie od aktywności i czasu trwania
      - Zabieranie przedmiotów nienależących do danej osoby (paczki, rzeczy z podjazdu, przedmioty z ogrodu)
      - Wspinanie się lub przeskakiwanie przez ogrodzenia/bariery w celu dostania się na teren posesji
      - Próby ukrycia działań lub przedmiotów przed kamerami
      - Długotrwałe kręcenie się: przebywanie w tym samym miejscu bez widocznego celu przez większość sekwencji
      - Zaglądanie do okien lub przez ogrodzenie
      - Nieznany samochód zaparkowany na podjeździe nocą
 
      ### Krytyczne zagrożenia — Poziom 2
      - Widoczne narzędzia włamywacze (łomy, nożyce do śrub, wytrychy)
      - Widoczna broń (pistolet, nóż, kij bejsbolowy używany agresywnie)
      - Trwające forsowanie wejścia (wyważanie drzwi, wybijanie okien)
      - Agresja fizyczna lub przemoc wobec osób
      - Aktywne niszczenie mienia lub kradzież w toku
 
      ### Reguły oceny — stosuj w tej kolejności:
      1. **Jeśli osoba jest zweryfikowana/znana** (sub_label z face recognition) → Poziom 0, niezależnie od pory i aktywności
      2. **Jeśli osoba jest niezidentyfikowana:**
        - Sprawdź porę: noc (23:00-5:00) + teren prywatny (podjazd, ogród, przy drzwiach) → Poziom 1
        - Sprawdź działania: testowanie drzwi/klamek, zabieranie przedmiotów, wspinanie się → Poziom 1
        - W przeciwnym razie: dzień/wieczór (6:00-22:00) z wyraźnym uzasadnionym celem (dostawa, serwis) → Poziom 0
      3. **Eskaluj do Poziomu 2 jeśli:** broń, narzędzia włamywacze, forsowanie wejścia w toku, przemoc lub aktywne niszczenie mienia
 
      Sama obecność niezidentyfikowanej osoby na terenie prywatnym w godzinach nocnych jest z natury podejrzana i wymaga uwagi, niezależnie od tego jaką aktywność wydaje się wykonywać i jak krótka jest sekwencja.

objects:
  track:
    - person
    - car
    - dog
    - cat
  filters:
    person:
      min_area: 5000
      max_area: 240000
      min_ratio: 0.3
      max_ratio: 0.8
    car:
      min_area: 10000
      max_area: 500000
      min_ratio: 1.5
      max_ratio: 3.0
  genai:
    enabled: true
    # ZMIANA: Generuj opisy GenAI TYLKO dla osób i samochodów (nie psów/kotów)
    objects:
      - person
      - car
    # ZMIANA: Wysyłaj opisy po zakończeniu + po 3 znaczących zmianach
    # (szybsze opisy dla powiadomień w trakcie zdarzenia)
    send_triggers:
      tracked_object_end: true
      after_significant_updates: 3
    # Custom prompts dostosowane do systemu alarmowego
    prompt: >-
      Przeanalizuj sekwencję obrazów z kamery bezpieczeństwa {camera} zawierających obiekt {label}. 
      Skup się na prawdopodobnym zamiarze i zachowaniu {label} na podstawie jego akcji i ruchu.
      Nie opisuj wyglądu ani otoczenia. Odpowiedz po polsku.
    object_prompts:
      person: >-
        Zbadaj główną osobę w tych obrazach z kamery {camera}. 
        Co robi i co mogą sugerować jej działania o jej zamiarze 
        (np. podchodzenie do drzwi, odchodzenie, stanie w miejscu, 
        rozglądanie się, testowanie klamek)?
        Jeśli osoba jest znana (sub_label: {sub_label}), zaznacz to.
        Nie opisuj otoczenia. Odpowiedz krótko, 1-2 zdania, po polsku.
      car: >-
        Opisz ruch i cel pojazdu w tych obrazach z kamery {camera}. 
        Czy parkuje, podjeżdża, odjeżdża, kręci się?
        Jeśli widoczne logo firmy kurierskiej — wymień. Odpowiedz krótko po polsku.
    
