version: "3.9"
services:
  frigate:
    container_name: frigate
    privileged: true # this may not be necessary for all setups
    restart: unless-stopped
    stop_grace_period: 30s # allow enough time to shut down the various services
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "1024mb" # update for your cameras based on calculation above
    deploy:    # <------------- Add this section
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    devices:
      - /dev/bus/usb:/dev/bus/usb # Passes the USB Coral, needs to be modified for other versions
      #- /dev/apex_0:/dev/apex_0 # Passes a PCIe Coral, follow driver instructions here https://coral.ai/docs/m2/get-started/#2a-on-linux
      #- /dev/video11:/dev/video11 # For Raspberry Pi 4B
      #- /dev/dri/renderD128:/dev/dri/renderD128 # For intel hwaccel, needs to be updated for your hardware
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - /mnt/frigate1:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 2000000000
    ports:
      - "8971:8971"
      - "192.168.10.30:5000:5000" # Internal unauthenticated — LAN only
      - "192.168.10.30:8554:8554" # RTSP feeds — LAN only
      - "192.168.10.30:8555:8555/tcp" # WebRTC — LAN only
      - "192.168.10.30:8555:8555/udp" # WebRTC — LAN only
    environment:
      FRIGATE_RTSP_PASSWORD: "HCuzkVRGEe2j3PFyt6HjX4QmJjp5trWT"
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"

      # HTTP -> redirect do HTTPS
      - "traefik.http.routers.frigate.entrypoints=http"
      - "traefik.http.routers.frigate.rule=Host(`frigate.lagowska46.ovh`)"
      - "traefik.http.middlewares.frigate-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.frigate.middlewares=frigate-https-redirect"

      # HTTPS router
      - "traefik.http.routers.frigate-secure.entrypoints=https"
      - "traefik.http.routers.frigate-secure.rule=Host(`frigate.lagowska46.ovh`)"
      - "traefik.http.routers.frigate-secure.tls=true"
      - "traefik.http.routers.frigate-secure.tls.certresolver=letsencrypt"

      # Only allow LAN + Tailscale clients
      - "traefik.http.routers.frigate-secure.middlewares=lan-only@file"

      # Service
      - "traefik.http.routers.frigate-secure.service=frigate"
      - "traefik.http.services.frigate.loadbalancer.server.port=8971"
      - "traefik.http.services.frigate.loadbalancer.server.scheme=http"

      # Upewnij się, że Traefik używa właściwej sieci Docker
      - "traefik.docker.network=traefik-proxy"
networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
