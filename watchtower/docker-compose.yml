services:
    watchtower:
        image: containrrr/watchtower:latest
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ~/.docker/config.json:/config.json:ro
        command: --label-enable --cleanup --interval 30
        restart: unless-stopped
        networks:
            - watchtower

networks:
    watchtower:
        external: true
        name: watchtower
 
