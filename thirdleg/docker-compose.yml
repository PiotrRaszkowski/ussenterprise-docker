services:
  thirdleg-services:
    image: ghcr.io/piotrraszkowski/thirdleg-services:latest
    container_name: thirdleg-services
    restart: unless-stopped
    networks:
      - traefik-proxy
      - mariadb
      - ollama
      - watchtower
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - SPRING_APPLICATION_JSON=${SPRING_APPLICATION_JSON}
      # Database configuration
      #- DB_USER=${THIRDLEG_DB_USER}
      #- DB_PASSWORD=${THIRDLEG_DB_PASSWORD}
      #- SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/${THIRDLEG_DB_NAME}

      # Ollama configuration (connects to ollama network)
      #- OLLAMA_BASE_URL=${THIRDLEG_OLLAMA_URL:-http://ollama:11434}
      #- OLLAMA_MODEL=${THIRDLEG_OLLAMA_MODEL:-llama3.1}

      # Spring Boot configuration
      #- SPRING_PROFILES_ACTIVE=prod
      #- LOGGING_LEVEL_ROOT=INFO
      #- LOGGING_LEVEL_COM_THIRDLEG=INFO
    
      # CORS configuration
      #- CORS_ALLOWED_ORIGINS=https://${THIRDLEG_DOMAIN}

      # Scheduling (optional - disable if not needed)
      #- APP_SCHEDULING_ENABLED=${THIRDLEG_SCHEDULING_ENABLED:-true}
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # HTTP to HTTPS redirect
      - "traefik.http.routers.thirdleg-services.entrypoints=http"
      - "traefik.http.routers.thirdleg-services.rule=(Host(`${THIRDLEG_DOMAIN}`) && PathPrefix(`/api`))"
      - "traefik.http.middlewares.thirdleg-services-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.thirdleg-services.middlewares=thirdleg-services-https-redirect"

      # HTTPS configuration
      - "traefik.http.routers.thirdleg-services-secure.entrypoints=https"
      - "traefik.http.routers.thirdleg-services-secure.rule=(Host(`${THIRDLEG_DOMAIN}`) && PathPrefix(`/api`))"
      - "traefik.http.routers.thirdleg-services-secure.tls=true"
      - "traefik.http.routers.thirdleg-services-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.thirdleg-services-secure.service=thirdleg-services"

      # Service configuration
      - "traefik.http.services.thirdleg-services.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-proxy"

      - "com.centurylinklabs.watchtower.enable=true"
#   healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
#     interval: 30s
#     timeout: 10s
#     retries: 3
#     start_period: 40s

  thirdleg-web:
    image: ghcr.io/piotrraszkowski/thirdleg-web:latest
    container_name: thirdleg-web
    restart: unless-stopped
    networks:
      - traefik-proxy
      - watchtower
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # HTTP to HTTPS redirect
      - "traefik.http.routers.thirdleg-web.entrypoints=http"
      - "traefik.http.routers.thirdleg-web.rule=Host(`${THIRDLEG_DOMAIN}`)"
      - "traefik.http.middlewares.thirdleg-web-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.thirdleg-web.middlewares=thirdleg-web-https-redirect"

      # HTTPS configuration
      - "traefik.http.routers.thirdleg-web-secure.entrypoints=https"
      - "traefik.http.routers.thirdleg-web-secure.rule=Host(`${THIRDLEG_DOMAIN}`)"
      - "traefik.http.routers.thirdleg-web-secure.tls=true"
      - "traefik.http.routers.thirdleg-web-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.thirdleg-web-secure.service=thirdleg-web"

      # Service configuration
      - "traefik.http.services.thirdleg-web.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-proxy"

      - "com.centurylinklabs.watchtower.enable=true"
#    healthcheck:
#      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 10s

networks:
  traefik-proxy:
    name: "traefik-proxy"
    external: true
  mariadb:
    name: "mariadb"
    external: true
  ollama:
    name: "ollama"
    external: true
  watchtower:
    name: "watchtower"
    external: true
